<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px; margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff; color: #1a1a1a;
    }
    .head { padding: 14px 16px 6px; font-weight: 700; color: #6c4ad6; font-size: 15px; }
    .sub { padding: 0 16px 12px; font-size: 12px; color: #666; line-height: 1.4; }
    .go {
      display: block; width: calc(100% - 32px); margin: 0 16px 14px; padding: 11px;
      background: #6c4ad6; color: #fff; border: none; border-radius: 9px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .go:hover { background: #5a3cc0; }
    .tip { padding: 0 16px 14px; font-size: 11px; color: #999; }
    kbd { background: #eee; border-radius: 4px; padding: 1px 5px; font-size: 11px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <div class="head">EasyRead</div>
  <div class="sub">Reads your selected text — or the whole article if nothing is selected — out loud, word by word.</div>
  <button class="go" id="go">▶ Read this page</button>
  <div class="tip">Tip: select text first to read just that part. Shortcut: <kbd>Alt</kbd>+<kbd>R</kbd>. Right-click also works.</div>
  <script src="popup.js"></script>
</body>
</html>
